# netlify.toml — SLA Capital marketing site config.

[build]
  publish = "."
  functions = "netlify/functions"

# ── 301 redirects for SEO continuity ────────────────────────
# Preserve every URL that has inbound links from the current
# WordPress build. Add new entries here as they surface.

[[redirects]]
  from   = "/apply-2/"
  to     = "/apply/"
  status = 301
  force  = true

[[redirects]]
  from   = "/apply-2"
  to     = "/apply/"
  status = 301
  force  = true

# Apply CTAs bounce to the portal's neutral apply page, which sorts
# borrowers to the correct LO by email. 302 so it's cheap to retarget
# when the neutral routing page moves. Both slash forms covered.
[[redirects]]
  from   = "/apply"
  to     = "https://portal.slacapital.ai/apply.html"
  status = 302
  force  = true

[[redirects]]
  from   = "/apply/"
  to     = "https://portal.slacapital.ai/apply.html"
  status = 302
  force  = true

# Alias /loans/dscr/ → /rental/ for future URL cleanup, but keep
# /rental/ as canonical to preserve the current site's rankings.
[[redirects]]
  from   = "/loans/dscr/*"
  to     = "/rental/:splat"
  status = 301
  force  = true

# ── Query-intent alias URLs → canonical product pages ────────
# High-volume search phrases people type when looking for investor
# lending. 301s send inbound-link authority to our canonical state
# pages while giving those phrases a landing target if they show up
# anywhere on the open web. Google indexes the destination, not the
# alias, so no duplicate-content risk.

# General "lender in <state>" → DSCR state page (highest-intent product)
[[redirects]]
  from   = "/lender-in-:state/"
  to     = "/rental/:state/"
  status = 301
  force  = true

# Private-lender phrasing → DSCR state page
[[redirects]]
  from   = "/private-lender-in-:state/"
  to     = "/rental/:state/"
  status = 301
  force  = true

# DSCR-specific phrasing (both hyphenations) → DSCR state page
[[redirects]]
  from   = "/dscr-lender-in-:state/"
  to     = "/rental/:state/"
  status = 301
  force  = true

[[redirects]]
  from   = "/dscr-loans-:state/"
  to     = "/rental/:state/"
  status = 301
  force  = true

# Hard money / fix & flip phrasings → Fix & Flip state page
[[redirects]]
  from   = "/hard-money-lender-in-:state/"
  to     = "/fix-n-flip/:state/"
  status = 301
  force  = true

[[redirects]]
  from   = "/fix-and-flip-lender-in-:state/"
  to     = "/fix-n-flip/:state/"
  status = 301
  force  = true

[[redirects]]
  from   = "/fix-and-flip-loans-:state/"
  to     = "/fix-n-flip/:state/"
  status = 301
  force  = true

# Construction phrasings → New Construction state page
[[redirects]]
  from   = "/construction-lender-in-:state/"
  to     = "/new-construction/:state/"
  status = 301
  force  = true

[[redirects]]
  from   = "/new-construction-loans-:state/"
  to     = "/new-construction/:state/"
  status = 301
  force  = true

# ── Cache-Control ────────────────────────────────────────────
# HTML is served fresh so content edits show up immediately.
# Static assets get long cache lifetimes since they're rarely edited.

[[headers]]
  for = "/*.html"
  [headers.values]
    Cache-Control = "public, max-age=60, must-revalidate"

[[headers]]
  for = "/assets/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/*.css"
  [headers.values]
    Cache-Control = "public, max-age=86400, must-revalidate"

# ── Security ─────────────────────────────────────────────────
[[headers]]
  for = "/*"
  [headers.values]
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"
    X-Frame-Options = "SAMEORIGIN"

# ── API namespace (for the lead form + future public endpoints) ─
[[redirects]]
  from   = "/api/lead-submit"
  to     = "/.netlify/functions/lead-submit"
  status = 200
  force  = true
